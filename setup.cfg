[flake8]
format = wemake
show-source = true
select = WPS, E999
# WPS 1.6.1 validates this option with a lower bound of 1.
max-noqa-comments = 1
forbidden-inline-ignore = WPS, E999
extend-exclude =
    .git,
    .hg,
    .mypy_cache,
    .pytest_cache,
    .ruff_cache,
    .tox,
    .venv,
    .env,
    __pycache__,
    venv,
    dist,
    build,
    example,
    big_example,
    stubs
